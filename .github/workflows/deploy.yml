name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploying via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/AL_Profile
            git pull origin master
            # Limpeza preventiva para evitar conflitos de nomes ou portas
            docker-compose -f docker-compose.blog.yml down --remove-orphans
            docker system prune -f --filter "label=com.docker.compose.project=al_profile" || true
            # Build e deploy
            docker-compose -f docker-compose.blog.yml up -d --build
            # Aguardar inicialização e reconectar rede do Nginx Proxy Manager
            sleep 5
            docker network connect al_profile_al-profile-network nginx-proxy-app-1 || true
            # Log de status para debug no Actions
            docker ps | grep al-profile
