name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploying via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Tentar encontrar o diretório correto (algumas VPS usam caminhos diferentes)
            if [ -d "~/AL_Profile" ]; then
              cd ~/AL_Profile
            elif [ -d "/home/adriano/AL_Profile" ]; then
              cd /home/adriano/AL_Profile
            else
              echo "Diretório AL_Profile não encontrado! Tentando criar..."
              mkdir -p ~/AL_Profile && cd ~/AL_Profile
              git clone https://github.com/Adriano-Lengruber/AL_Profile.git . || true
            fi

            # Garantir que estamos na branch master e atualizados
            git fetch origin master
            git reset --hard origin/master
            
            # Limpeza resiliente (não falha se o container não existir)
            docker stop al-profile-frontend al-profile-backend al-profile-mongodb 2>/dev/null || true
            docker rm al-profile-frontend al-profile-backend al-profile-mongodb 2>/dev/null || true
            
            # Verificar se docker-compose ou 'docker compose' está disponível
            COMPOSE_CMD="docker-compose"
            if ! command -v docker-compose &> /dev/null; then
              COMPOSE_CMD="docker compose"
            fi
            
            # Subir containers
            $COMPOSE_CMD -f docker-compose.blog.yml up -d --build
            
            # Aguardar inicialização
            sleep 10
            
            # Reconectar rede do Nginx Proxy Manager (NPM)
            # O nome da rede padrão do compose é [nome_da_pasta]_al-profile-network
            # Se a pasta for AL_Profile, o docker converte para minúsculo: al_profile_al-profile-network
            docker network connect al_profile_al-profile-network nginx-proxy-app-1 2>/dev/null || true
            
            # Verificação de Saúde
            echo "--- CONTAINERS ATIVOS ---"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | grep al-profile
