name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploying via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/AL_Profile
            git pull origin master
            
            # Limpeza radical para liberar recursos e remover conflitos
            docker stop al-profile-frontend al-profile-backend al-profile-mongodb || true
            docker rm al-profile-frontend al-profile-backend al-profile-mongodb || true
            docker-compose -f docker-compose.blog.yml down --remove-orphans || true
            
            # Prune de imagens antigas para liberar espaço (comum em VPS)
            docker image prune -f || true
            
            # Tentar o build e up com timeout e log de erros
            if ! docker-compose -f docker-compose.blog.yml up -d --build; then
              echo "ERRO: Falha no docker-compose up. Tentando logs..."
              docker-compose -f docker-compose.blog.yml logs --tail 50
              exit 1
            fi
            
            # Aguardar inicialização estável
            sleep 15
            
            # Reconectar o Nginx Proxy Manager à rede do projeto (O NPM deve estar rodando na mesma VPS)
            # O nome da rede no Docker Compose é derivado do nome da pasta (AL_Profile) -> al_profile_al-profile-network
            docker network connect al_profile_al-profile-network nginx-proxy-app-1 || true
            
            # Verificação Final
            echo "--- STATUS FINAL ---"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | grep al-profile
            
            # Teste de resposta HTTP interna
            docker exec al-profile-frontend curl -I localhost || echo "Frontend não está respondendo internamente!"
