name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploying via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/AL_Profile
            git pull origin master
            # Limpeza preventiva total para garantir que não existam containers antigos
            docker stop al-profile-frontend al-profile-backend al-profile-mongodb || true
            docker rm al-profile-frontend al-profile-backend al-profile-mongodb || true
            docker-compose -f docker-compose.blog.yml down --remove-orphans
            
            # Garantir que a rede externa existe
            docker network create nginx-proxy || true
            
            # Build e deploy com log detalhado
            docker-compose -f docker-compose.blog.yml up -d --build
            
            # Aguardar e reconectar rede do Nginx Proxy Manager
            sleep 10
            docker network connect al_profile_al-profile-network nginx-proxy-app-1 || true
            
            # Diagnóstico pós-deploy para o log do GitHub Actions
            echo "--- STATUS DOS CONTAINERS ---"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | grep al-profile
            echo "--- LOGS DO FRONTEND (Últimas 20 linhas) ---"
            docker logs --tail 20 al-profile-frontend
            echo "--- VERIFICAÇÃO DE PORTA 3003 ---"
            netstat -tuln | grep 3003 || echo "Porta 3003 não encontrada no host!"
