name: Deploy to VPS

on:
  push:
    branches:
      - master

concurrency:
  group: deploy-vps-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploying via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -Eeuo pipefail

            if [ -d "$HOME/AL_Profile/.git" ]; then
              cd "$HOME/AL_Profile"
            elif [ -d "/home/adriano/AL_Profile/.git" ]; then
              cd /home/adriano/AL_Profile
            else
              mkdir -p "$HOME/AL_Profile"
              cd "$HOME/AL_Profile"
              if [ ! -d .git ]; then
                git clone https://github.com/Adriano-Lengruber/AL_Profile.git .
              fi
            fi

            PREVIOUS_COMMIT="$(git rev-parse HEAD 2>/dev/null || true)"

            COMPOSE_CMD="docker-compose"
            if ! command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD="docker compose"
            fi

            rollback() {
              if [ -n "${PREVIOUS_COMMIT:-}" ]; then
                echo "--- ROLLBACK AUTOMATICO ---"
                git reset --hard "$PREVIOUS_COMMIT"
                $COMPOSE_CMD -f docker-compose.blog.yml up -d --build --remove-orphans || true
                docker network connect al_profile_al-profile-network nginx-proxy-app-1 2>/dev/null || true
              fi
            }

            run_healthcheck() {
              local name="$1"
              local url="$2"

              for attempt in 1 2 3 4 5 6; do
                if curl -fsSI "$url" >/dev/null; then
                  echo "[$name] OK - tentativa $attempt"
                  return 0
                fi

                echo "[$name] aguardando - tentativa $attempt"
                sleep 5
              done

              echo "[$name] falhou"
              return 1
            }

            git fetch origin master
            git reset --hard origin/master

            if [ ! -f docker-compose.blog.yml ]; then
              echo "docker-compose.blog.yml nao encontrado"
              rollback
              exit 1
            fi

            if ! $COMPOSE_CMD -f docker-compose.blog.yml up -d --build --remove-orphans; then
              rollback
              exit 1
            fi

            docker network connect al_profile_al-profile-network nginx-proxy-app-1 2>/dev/null || true

            echo "--- CONTAINERS ATIVOS ---"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | grep al-profile

            if ! docker ps --format "{{.Names}}" | grep -qx "al-profile-frontend"; then
              docker logs --tail 120 al-profile-frontend || true
              rollback
              exit 1
            fi

            if ! docker ps --format "{{.Names}}" | grep -qx "al-profile-backend"; then
              docker logs --tail 120 al-profile-backend || true
              rollback
              exit 1
            fi

            if ! run_healthcheck "frontend-local" "http://localhost:3003/"; then
              docker logs --tail 120 al-profile-frontend || true
              rollback
              exit 1
            fi

            if ! run_healthcheck "api-local" "http://localhost:3005/api/posts"; then
              docker logs --tail 120 al-profile-backend || true
              rollback
              exit 1
            fi

            if ! run_healthcheck "dominio-publico" "https://adriano-lengruber.com/"; then
              rollback
              exit 1
            fi
