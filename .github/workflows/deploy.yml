name: Deploy to VPS

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/deploy.yml'
      - 'scripts/**'
      - 'src/**'
      - 'server/**'
      - 'Imgs/**'
      - 'public/**'
      - 'docker-compose.blog.yml'
      - 'Dockerfile'
      - 'nginx.conf'
      - 'package.json'
      - 'package-lock.json'
      - 'pnpm-lock.yaml'
      - 'vite.config.ts'
      - 'tsconfig*.json'
  workflow_dispatch:

concurrency:
  group: deploy-vps-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Deploying via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60s
          command_timeout: 30m
          script: |
            set -Eeuo pipefail
            APP_DIR="$HOME/AL_Profile"
            if [ ! -d "$APP_DIR/.git" ] && [ -d "/home/adriano/AL_Profile/.git" ]; then
              APP_DIR="/home/adriano/AL_Profile"
            fi

            if [ ! -f "$APP_DIR/scripts/vps-safe-deploy.sh" ]; then
              mkdir -p "$APP_DIR"
              cd "$APP_DIR"
              if [ ! -d .git ]; then
                git clone https://github.com/Adriano-Lengruber/AL_Profile.git .
              fi
            else
              cd "$APP_DIR"
            fi

            APP_DIR="$APP_DIR" PUBLIC_DOMAIN="https://adriano-lengruber.com" bash "$APP_DIR/scripts/vps-safe-deploy.sh"
