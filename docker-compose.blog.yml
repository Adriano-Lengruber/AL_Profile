version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: al-profile-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: al-profile-blog
    volumes:
      - mongodb_data:/data/db
    networks:
      - al-profile-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: al-profile-backend
    restart: unless-stopped
    ports:
      - "3005:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGODB_URI=mongodb://mongodb:27017/al-profile-blog
      - JWT_SECRET=${JWT_SECRET:-sua_chave_secreta_muito_segura_aqui_32_chars}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - al-profile-network

  frontend:
    build: .
    container_name: al-profile-frontend
    restart: unless-stopped
    ports:
      - "3003:80"
    environment:
      # Usar URL relativa para funcionar com proxy do nginx
      - VITE_API_URL=/api
    depends_on:
      - backend
    networks:
      - al-profile-network

volumes:
  mongodb_data:

networks:
  al-profile-network:
    driver: bridge
